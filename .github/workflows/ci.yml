name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # A single restore+build step with an explicit RID: the csproj infers the
      # RuntimeIdentifier from the build host's process architecture, which
      # conflicts with Platform=ARM64 on an x64 runner. Passing -r overrides it.
      - name: Build
        run: dotnet build BinaryExplorer.csproj -c Release -p:Platform=${{ matrix.platform }} -r ${{ matrix.rid }}

      # Run the test suite only on x64 — the ARM64 matrix entry is a cross-compile
      # build check; running ARM64 tests would need an ARM64 runner.
      - name: Test
        if: matrix.platform == 'x64'
        run: dotnet test tests/BinaryExplorer.Tests/BinaryExplorer.Tests.csproj -c Release -p:Platform=x64 --nologo
