name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ x64, ARM64 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore BinaryExplorer.csproj -p:Platform=${{ matrix.platform }}

      - name: Build
        run: dotnet build BinaryExplorer.csproj --no-restore -c Release -p:Platform=${{ matrix.platform }}
