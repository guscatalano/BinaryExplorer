name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: '4-part version (e.g. 1.2.3.0). Defaults to 1.0.0.0.'
        required: false
        default: '1.0.0.0'

jobs:
  package:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            rid: win-x64
            arch: x64
          - platform: ARM64
            rid: win-arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $v = '${{ github.ref_name }}' -replace '^v',''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          if ($v -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') { $v = '1.0.0.0' }
          if (($v -split '\.').Count -eq 3) { $v = "$v.0" }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      - name: Stamp manifest version
        shell: pwsh
        run: |
          [xml]$m = Get-Content Package.appxmanifest
          $m.Package.Identity.Version = '${{ steps.ver.outputs.version }}'
          $m.Save((Resolve-Path Package.appxmanifest))

      - name: Create signing certificate
        id: cert
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $cert = New-SelfSignedCertificate `
            -Type Custom -Subject 'CN=AppPublisher' `
            -KeyUsage DigitalSignature -FriendlyName 'BinaryExplorer CI' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3', '2.5.29.19={text}')
          $pwd = ConvertTo-SecureString -String 'BinExpl0rer!' -Force -AsPlainText
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfx -Password $pwd | Out-Null
          Export-Certificate -Cert $cert -FilePath "artifacts\BinaryExplorer-${{ matrix.platform }}.cer" | Out-Null
          "pfx=$pfx" >> $env:GITHUB_OUTPUT

      - name: Build MSIX (unsigned)
        run: >
          dotnet build BinaryExplorer.csproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          -r ${{ matrix.rid }}
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageDir=${{ github.workspace }}\artifacts\msix\
          -p:UapAppxPackageBuildMode=SideloadOnly
          -p:AppxBundle=Never
          -p:AppxPackageSigningEnabled=false

      - name: Sign MSIX
        shell: pwsh
        run: |
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Sort-Object FullName | Select-Object -Last 1 -ExpandProperty FullName
          if (-not $signtool) { throw 'signtool.exe not found' }
          $msix = Get-ChildItem artifacts\msix -Recurse -Filter 'BinaryExplorer*.msix' | Select-Object -First 1
          & $signtool sign /fd SHA256 /f '${{ steps.cert.outputs.pfx }}' /p 'BinExpl0rer!' $msix.FullName
          if ($LASTEXITCODE -ne 0) { throw 'MSIX signing failed' }

      - name: Publish unpackaged (for MSI)
        run: >
          dotnet publish BinaryExplorer.csproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          -r ${{ matrix.rid }}
          --self-contained
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          -p:GenerateAppxPackageOnBuild=false
          -o ${{ github.workspace }}\artifacts\publish-${{ matrix.platform }}

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        run: >
          wix build installer\BinaryExplorer.wxs
          -d PublishDir=${{ github.workspace }}\artifacts\publish-${{ matrix.platform }}
          -d Version=${{ steps.ver.outputs.version }}
          -arch ${{ matrix.arch }}
          -o ${{ github.workspace }}\artifacts\BinaryExplorer-${{ matrix.platform }}.msi

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # The MSIX needs its dependency runtimes + Install.ps1 — ship the whole sideload folder zipped.
          $testDir = Get-ChildItem artifacts\msix -Directory | Select-Object -First 1
          Compress-Archive -Path "$($testDir.FullName)\*" -Force `
            -DestinationPath "dist\BinaryExplorer-${{ matrix.platform }}-msix.zip"
          Copy-Item artifacts\BinaryExplorer-${{ matrix.platform }}.msi dist
          Copy-Item artifacts\BinaryExplorer-${{ matrix.platform }}.cer dist
          Get-ChildItem dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BinaryExplorer-${{ matrix.platform }}
          path: dist/**

  release:
    needs: package
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
